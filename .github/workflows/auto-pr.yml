name: Automatic Pull Request
on:
  push:
    branches-ignore:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Create or update Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BRANCH="${{ github.ref_name }}"
          TITLE="Automatic PR from ${BRANCH}"
          BODY_FILE=".github/PULL_REQUEST_TEMPLATE/auto-pr.md"

          EXISTING_PR_NUMBER="$(gh pr list --head "${BRANCH}" --base main --state open --json number --jq '.[0].number // empty')"

          if [ -n "${EXISTING_PR_NUMBER}" ]; then
            echo "Updating existing PR #${EXISTING_PR_NUMBER}"
            gh pr edit "${EXISTING_PR_NUMBER}" --title "${TITLE}" --body-file "${BODY_FILE}"
          else
            echo "Creating new PR for branch ${BRANCH}"
            gh pr create --base main --head "${BRANCH}" --title "${TITLE}" --body-file "${BODY_FILE}"
          fi