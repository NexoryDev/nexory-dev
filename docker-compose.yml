services:
  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - app
    command: redis-server --save "" --appendonly no

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    restart: always
    depends_on:
      - redis
      - clamav

    networks:
      app:
        ipv4_address: 172.19.0.10

    volumes:
      - avatar_uploads:/app/static/uploads/avatars
      - avatar_quarantine:/app/static/uploads/avatar-quarantine

    environment:
      AVATAR_ENABLE_MALWARE_SCAN: "true"
      AVATAR_CLAMD_HOST: clamav
      AVATAR_CLAMD_PORT: "3310"
      AVATAR_QUARANTINE_FOLDER: /app/static/uploads/avatar-quarantine

  clamav:
    image: clamav/clamav:latest
    restart: always
    networks:
      - app
    volumes:
      - clamav_db:/var/lib/clamav
    healthcheck:
      test: ["CMD-SHELL", "clamdscan --version >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:80"
    restart: always
    depends_on:
      - backend
    networks:
      - app

networks:
  app:
    driver: bridge
    ipam:
      config:
        - subnet: 172.19.0.0/16
          gateway: 172.19.0.1

volumes:
  avatar_uploads:
  avatar_quarantine:
  clamav_db: