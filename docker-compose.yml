services:
  redis:
    image: redis:7-alpine
    user: "redis"
    read_only: true
    tmpfs:
      - /tmp
    pids_limit: 64
    mem_limit: 256m
    cpus: "0.25"
    restart: always
    networks:
      - app
    command: redis-server --save "" --appendonly no

  backend:
    build:
      context: ./backend
    command: gunicorn -w 2 -b 0.0.0.0:5000 app.app:app
    user: "10001:10001"
    read_only: true
    tmpfs:
      - /tmp
      - /var/tmp
      - /tmp/nexory-logs
    pids_limit: 128
    mem_limit: 512m
    cpus: "0.5"
    env_file:
      - ./backend/.env
    restart: always
    depends_on:
      - redis
      - clamav

    networks:
      app:
        ipv4_address: 172.19.0.10

    volumes:
      - avatar_uploads:/app/static/uploads/avatars
      - avatar_quarantine:/app/static/uploads/avatar-quarantine

    environment:
      AVATAR_ENABLE_MALWARE_SCAN: "true"
      AVATAR_CLAMD_HOST: clamav
      AVATAR_CLAMD_PORT: "3310"
      AVATAR_QUARANTINE_FOLDER: /app/static/uploads/avatar-quarantine
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; s=socket.socket(); s.settimeout(2); s.connect((\"127.0.0.1\",5000)); s.close()' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  clamav:
    image: clamav/clamav:latest
    user: "clamav"
    read_only: true
    tmpfs:
      - /tmp
      - /run/clamav
    pids_limit: 128
    mem_limit: 768m
    cpus: "0.5"
    restart: always
    networks:
      - app
    volumes:
      - clamav_db:/var/lib/clamav
    healthcheck:
      test: ["CMD-SHELL", "clamdscan --version >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
    user: "nginx"
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx:mode=1777
      - /var/run:mode=1777
      - /var/log/nginx:mode=1777
    pids_limit: 64
    mem_limit: 256m
    cpus: "0.25"
    ports:
      - "8080:80"
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

networks:
  app:
    driver: bridge
    ipam:
      config:
        - subnet: 172.19.0.0/16
          gateway: 172.19.0.1

volumes:
  avatar_uploads:
  avatar_quarantine:
  clamav_db: