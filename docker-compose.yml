services:
  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - app
    command: redis-server --save "" --appendonly no

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    expose:
      - "5000"
    restart: always
    depends_on:
      - redis
    networks:
      - app
    volumes:
      - avatar_uploads:/app/static/uploads/avatars

  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:80"
    restart: always
    depends_on:
      - backend
    networks:
      - app

networks:
  app:
    driver: bridge

volumes:
  avatar_uploads:
